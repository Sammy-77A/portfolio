<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>500 — System Failure | Samuel Ndubi</title>
  <meta name="description" content="Persistent system failure detected. Manual reboot required." />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111; --surface: #1a1b1e; --text: #fff; --text-dim: #9ca3af;
      --border: rgba(255,255,255,0.08); --bg2: #1b1b1b; --muted: #6b6b6b;
      --primary: #f04e0f;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f5; --surface: #ffffff; --text: #111; --text-dim: #4b5563;
        --border: rgba(0,0,0,0.08); --bg2: #eaeaea; --muted: #888;
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      transition: background .3s, color .3s;
    }

    .error-card {
      position: relative; z-index: 2;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 3.5rem 3rem 2.5rem;
      max-width: 520px; width: 90%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: scaleUp 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .error-icon {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 3px solid #b91c1c;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.8rem;
      background: var(--bg2);
      animation: pulse-glow-red 2s ease-in-out infinite;
    }

    .icon-main { font-size: 40px; line-height: 1; }

    .error-code {
      font-family: monospace;
      font-size: 0.85rem; font-weight: 600;
      letter-spacing: 2px; color: #b91c1c;
      margin-bottom: 0.8rem;
    }

    .error-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem; letter-spacing: 3px;
      color: var(--text); margin-bottom: 1rem; line-height: 1.1;
    }

    .error-msg {
      color: var(--text-dim);
      font-size: 0.95rem; line-height: 1.7;
      max-width: 400px; margin: 0 auto 2.5rem;
    }

    .error-actions {
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
    }

    .error-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; border: none;
      text-decoration: none;
      transition: all .25s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    .error-btn.home {
      background: var(--primary); color: #fff;
    }

    .error-btn.report {
      background: transparent; border: 1.5px solid var(--border); color: var(--text);
    }

    .error-btn:hover {
      filter: brightness(1.15);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(240, 78, 15, 0.2);
    }

    .error-btn.report:hover {
      border-color: var(--primary); color: var(--primary);
    }

    .error-footer {
      margin-top: 2.5rem; padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .error-footer span {
      font-size: 0.7rem; color: var(--muted);
      letter-spacing: 1.5px; text-transform: uppercase;
    }

    .glitch-line {
      width: 40px; height: 2px;
      background: var(--primary); border-radius: 2px;
      animation: glitch-flicker 3s linear infinite;
    }

    .bg-glitch {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(240,78,15,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(255,105,48,0.04) 0%, transparent 60%);
      animation: bg-drift 8s ease-in-out infinite alternate;
    }

    @keyframes scaleUp {
      from { transform: scale(0.9) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes pulse-glow-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(185,28,28,0); }
      50% { box-shadow: 0 0 30px 8px rgba(185,28,28,0.15); }
    }
    @keyframes glitch-flicker {
      0%, 92%, 100% { opacity: 1; width: 40px; }
      93% { opacity: 0.3; width: 20px; }
      95% { opacity: 1; width: 60px; }
      97% { opacity: 0.5; width: 10px; }
    }
    @keyframes bg-drift {
      0% { transform: scale(1) rotate(0); }
      100% { transform: scale(1.1) rotate(2deg); }
    }

    @media (max-width: 600px) {
      .error-card { padding: 2.5rem 1.5rem 2rem; }
      .error-title { font-size: 2rem; }
      .error-icon { width: 70px; height: 70px; }
      .icon-main { font-size: 32px; }
      .error-actions { flex-direction: column; align-items: stretch; }
      .error-btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-icon">
      <span class="icon-main">🔥</span>
    </div>
    <div class="error-code">[SYSTEM_CRITICAL_500]</div>
    <h1 class="error-title">SYSTEM_FAILURE</h1>
    <p class="error-msg">Internal loop failure detected. Wires might be crossed in the backend logic. Manual reboot required.</p>
    
    <div class="error-actions">
      <a href="/" class="error-btn home">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Attempt Reboot
      </a>
      <a href="mailto:nds.samuel@gmail.com?subject=System%20Failure%20Report&body=I%20encountered%20a%20500%20System%20Failure%20at%20samuelbuilds.top." class="error-btn report">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Report Issue
      </a>
    </div>

    <div class="error-footer">
      <div class="glitch-line"></div>
      <span>Reported by System Sentinel</span>
    </div>
  </div>
  <div class="bg-glitch"></div>
</body>
</html>
